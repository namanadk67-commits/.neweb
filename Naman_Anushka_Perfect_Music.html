
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naman ❤️ Anushka</title>
<style>
body{margin:0;background:linear-gradient(#080b1f,#35104d);color:white;font-family:Segoe UI,sans-serif;overflow:hidden}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
h1{font-size:4rem;text-shadow:0 0 20px #ff4da6}
.btn{padding:14px 25px;border:none;border-radius:30px;background:#ff4da6;color:#fff;cursor:pointer;font-size:18px}
.heart{position:fixed;font-size:20px;animation:up 10s linear infinite}
@keyframes up{from{transform:translateY(110vh)}to{transform:translateY(-120px)}}
</style>
</head>
<body>
<div class="hero">
<h1>Naman ❤️ Anushka</h1>
<h2>Happy Anniversary 💍</h2>
<p>Together Since Class 6 ❤️</p>

<audio id="song" loop>
<source src="Edd_Sheeran_-_Perfect_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<button class="btn" onclick="toggleMusic()">🎵 Play Perfect</button>

<p style="max-width:700px;margin-top:20px">
Dear Anushka,<br><br>
Thank you for every smile, every memory and every moment.
Happy Anniversary ❤️<br><br>
Forever Yours,<br>
Naman
</p>
</div>

<script>
for(let i=0;i<60;i++){
 let h=document.createElement('div');
 h.className='heart';
 h.innerHTML='❤️';
 h.style.left=Math.random()*100+'vw';
 h.style.animationDuration=(6+Math.random()*8)+'s';
 document.body.appendChild(h);
}
function toggleMusic(){
 const a=document.getElementById('song');
 if(a.paused){a.play();}else{a.pause();}
}
</script>
</body>
</html>
